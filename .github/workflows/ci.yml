# MOW CI
#
# Jobs:
#   lint      staticcheck / govet / etc. via golangci-lint (Linux)
#   test      build + unit-tests + e2e on Linux & Windows
#   race      -race on all modules (Linux: native gcc; Windows: mingw if available)
#   gosec     security scan (SAST) on Linux
#
# 触发：
#   - push -> main
#   - PR
#   - workflow_dispatch：手动跑单个 job（lint / test / race / gosec / all）
#
# 设计说明：
#   - Go workspace 已在 go.work 声明各 module；CI 内逐个 module 显式操作，
#     避免 workspace 根目录 `./...` 不匹配的坑。
#   - `build-plugin` job 提前把 plugins/ssh 编译为 artifact，e2e job 通过
#     环境变量 `MOW_SSH_PLUGIN` 复用它，避免每个平台再重复编译。
#
# 版本原则：所有 action 固定到已 GA 的 major 版本；避免误用未来 breaking。

name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      only:
        description: "Job subset to run"
        required: false
        default: "all"
        type: choice
        options: ["all", "lint", "test", "race", "gosec", "docker-e2e"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Keep in sync with every go.mod, go.work and the documented baseline.
  GO_VERSION: '1.25.x'

jobs:
  # ---------------------------------------------------------------------------
  # lint （只在 Linux 上跑一次）
  # ---------------------------------------------------------------------------
  lint:
    name: lint
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.only == 'all' || inputs.only == 'lint' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: '**/go.sum'

      - name: Lint all modules
        run: bash scripts/lint.sh

  # ---------------------------------------------------------------------------
  # 先编译一次 ssh 插件，作为 e2e artifact，节省两平台各一次的 build 成本。
  # ---------------------------------------------------------------------------
  build-plugin:
    name: build-plugin (${{ matrix.os }})
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.only == 'all' || inputs.only == 'test' || inputs.only == 'race' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: '**/go.sum'

      - name: Build plugins/ssh
        shell: bash
        run: |
          set -euo pipefail
          cd plugins/ssh
          if [ "${{ runner.os }}" = "Windows" ]; then
            go build -o ../../ssh-plugin.exe .
          else
            go build -o ../../ssh-plugin .
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ssh-plugin-${{ runner.os }}
          path: |
            ssh-plugin
            ssh-plugin.exe
          if-no-files-found: ignore
          retention-days: 1

  # ---------------------------------------------------------------------------
  # frontend：Go build 不会编译 Wails 的 React 资源，因此单独验证。
  # ---------------------------------------------------------------------------
  frontend:
    name: frontend build
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.only == 'all' || inputs.only == 'test' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: apps/desktop/frontend/package-lock.json

      - name: Build desktop frontend
        working-directory: apps/desktop/frontend
        run: |
          npm ci
          npm test
          npm run build

  # ---------------------------------------------------------------------------
  # test：build + unit + e2e
  # ---------------------------------------------------------------------------
  test:
    name: test (${{ matrix.os }})
    needs: build-plugin
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.only == 'all' || inputs.only == 'test' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: '**/go.sum'

      - name: Show env
        run: |
          go version
          go env GOOS GOARCH CGO_ENABLED

      - name: Build all modules
        shell: bash
        run: |
          set -euo pipefail
          for m in core apps/cli apps/desktop plugins/ssh plugins/docker plugins/ai plugins/pve sdk tests/e2e; do
            echo "--- build $m ---"
            (cd "$m" && go build ./...)
          done

      - name: Vet
        shell: bash
        run: |
          set -euo pipefail
          for m in core apps/cli apps/desktop plugins/ssh plugins/docker plugins/ai plugins/pve sdk tests/e2e; do
            (cd "$m" && go vet ./...)
          done

      - name: Unit tests
        shell: bash
        run: |
          set -euo pipefail
          (cd core && go test -count=1 ./...)
          (cd apps/cli && go test -count=1 ./...)
          (cd apps/desktop && go test -count=1 ./...)
          (cd plugins/ssh && go test -count=1 ./...)
          (cd plugins/docker && go test -count=1 ./...)
          (cd plugins/ai && go test -count=1 ./...)
          (cd plugins/pve && go test -count=1 ./...)
          (cd sdk && go test -count=1 ./...)

      - name: Download prebuilt SSH plugin
        uses: actions/download-artifact@v4
        with:
          name: ssh-plugin-${{ runner.os }}
          path: ${{ github.workspace }}

      - name: E2E tests (using prebuilt plugin)
        shell: bash
        env:
          # tests/e2e 会优先读取 MOW_SSH_PLUGIN，避免每次重编。
          MOW_SSH_PLUGIN: ${{ github.workspace }}/ssh-plugin${{ runner.os == 'Windows' && '.exe' || '' }}
        run: |
          set -euo pipefail
          chmod +x "$MOW_SSH_PLUGIN" || true
          (cd tests/e2e && go test -count=1 ./...)

  # ---------------------------------------------------------------------------
  # race：CGO 必要
  # ---------------------------------------------------------------------------
  race:
    name: race (${{ matrix.os }})
    needs: build-plugin
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.only == 'all' || inputs.only == 'race' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: '**/go.sum'

      - name: Ensure C compiler (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Get-Command gcc -ErrorAction SilentlyContinue)) {
            choco install -y mingw --no-progress
          }
          gcc --version

      - name: Race (Linux/macOS)
        if: runner.os != 'Windows'
        run: bash scripts/race.sh

      - name: Race (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\race.ps1

  # ---------------------------------------------------------------------------
  # gosec：安全静态扫描（Linux）
  # ---------------------------------------------------------------------------
  gosec:
    name: gosec
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.only == 'all' || inputs.only == 'gosec' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: '**/go.sum'

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.25.0

      - name: gosec
        shell: bash
        run: |
          set -euo pipefail
          for m in core apps/cli apps/desktop plugins/ssh plugins/docker plugins/ai plugins/pve sdk tests/e2e; do
            echo "--- gosec $m ---"
            # G115 flags well-bounded terminal fd / process exit-code casts in
            # existing cross-platform adapters; keep the established policy
            # while running the scanner with the repository's Go toolchain.
            (cd "$m" && gosec -conf "$GITHUB_WORKSPACE/.gosec.json" -exclude-dir=proto -exclude=G104,G115,G301,G304,G404 ./...)
          done

  # ---------------------------------------------------------------------------
  # docker-e2e：真实 Docker daemon 端到端测试
  #
  # 触发策略（v0.3.1：从 workflow_dispatch 提升为常规 pipeline 的一部分）：
  #   - push 到 main：一律跑，作为主干健康的一级信号
  #   - workflow_dispatch：手动 only=all / only=docker-e2e 时跑
  #   - pull_request：只有当变更触及 docker 相关路径时才跑
  #       * plugins/docker/** —— 插件本体
  #       * tests/e2e/docker*_test.go —— e2e 用例
  #       * apps/desktop/docker_*.go —— 桌面绑定
  #       * .github/workflows/ci.yml —— 本工作流本身
  #     这避免了无关 PR（例如仅动 CLI 文档）也要拉镜像 + 拉起 daemon。
  #
  # 并发：docker-e2e 使用独立的 concurrency group，防止同一 ref 内两个
  # 触发源（push+dispatch）同时抢 daemon；顶层 ci-${ref} 已管 test/race。
  #
  # 运行前提：
  #   - MOW_DOCKER_E2E=1 让 e2e 用例真正执行（否则 t.Skip）
  #   - ubuntu-latest 自带 Docker daemon（/var/run/docker.sock 可读）
  #   - 预编译 plugins/docker 供 e2e 复用（避免测试内每次 build）
  # ---------------------------------------------------------------------------
  docker-e2e:
    name: docker-e2e (linux)
    # 允许所有触发进入 job；PR 场景由 filter step 决定各真实步骤是否跳过。
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' &&
       (inputs.only == 'all' || inputs.only == 'docker-e2e'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: docker-e2e-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      # v0.3.1：PR 中做变更路径过滤；push/dispatch 一律 should_run=true。
      # dorny/paths-filter 已在市面广泛使用；仅在 pull_request 事件里读 diff。
      - name: Filter changed paths (PR only)
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docker:
              - 'plugins/docker/**'
              - 'tests/e2e/docker*_test.go'
              - 'tests/e2e/*docker*.go'
              - 'apps/desktop/docker_*.go'
              - 'apps/desktop/frontend/src/pages/DockerExecDrawer.tsx'
              - 'apps/desktop/frontend/src/pages/DockerPage.tsx'
              - '.github/workflows/ci.yml'

      # 决定是否真正运行：push / workflow_dispatch → 一律 true；
      #                    pull_request → 依 filter 结果。
      - name: Decide run
        id: gate
        shell: bash
        env:
          EVENT: ${{ github.event_name }}
          DOCKER_CHANGED: ${{ steps.filter.outputs.docker }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = "pull_request" ]; then
            if [ "$DOCKER_CHANGED" = "true" ]; then
              echo "run=true" >> "$GITHUB_OUTPUT"
              echo "PR touches docker-related paths → running docker-e2e"
            else
              echo "run=false" >> "$GITHUB_OUTPUT"
              echo "PR does NOT touch docker paths → skipping docker-e2e"
            fi
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-go@v5
        if: steps.gate.outputs.run == 'true'
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: '**/go.sum'

      - name: Docker sanity check
        if: steps.gate.outputs.run == 'true'
        run: |
          docker version
          docker info | head -30
          # 提前把 alpine:3.19 拉一次，让 TestDockerE2E_Pull 的 assertion
          # 只依赖 "已缓存 → up to date" 这条更稳定的路径。
          docker pull alpine:3.19

      - name: Build docker plugin (reused by e2e)
        if: steps.gate.outputs.run == 'true'
        run: |
          set -euo pipefail
          cd plugins/docker
          go build -o "$GITHUB_WORKSPACE/docker-plugin" .
          ls -la "$GITHUB_WORKSPACE/docker-plugin"

      - name: Run docker E2E tests
        if: steps.gate.outputs.run == 'true'
        env:
          MOW_DOCKER_E2E: "1"
          MOW_DOCKER_PLUGIN: ${{ github.workspace }}/docker-plugin
          # 显式指向 daemon；不设 DOCKER_HOST 时也会回落到 /var/run/docker.sock
          DOCKER_HOST: "unix:///var/run/docker.sock"
        run: |
          set -euo pipefail
          cd tests/e2e
          # 只跑 Docker 相关用例；SSH E2E 在 test job 已覆盖。
          go test -count=1 -v -run 'TestDockerE2E' ./...

      - name: Post-cleanup — remove stray e2e containers
        # always()：无论 run/skip 都尝试清理（skip 时无容器可清，最坏无 op）
        if: always()
        run: |
          # 兜底清理：即便测试自身 t.Cleanup 挂了，也把标签为 mow-e2e=1 的容器清掉
          ids=$(docker ps -a --filter label=mow-e2e=1 -q 2>/dev/null || true)
          if [ -n "$ids" ]; then
            docker rm -f $ids || true
          fi
