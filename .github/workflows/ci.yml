# MOW CI
#
# Jobs:
#   lint      staticcheck / govet / etc. via golangci-lint (Linux)
#   test      build + unit-tests + e2e on Linux & Windows
#   race      -race on all modules (Linux: native gcc; Windows: mingw if available)
#   gosec     security scan (SAST) on Linux
#
# 触发：
#   - push -> main
#   - PR
#   - workflow_dispatch：手动跑单个 job（lint / test / race / gosec / all）
#
# 设计说明：
#   - Go workspace 已在 go.work 声明各 module；CI 内逐个 module 显式操作，
#     避免 workspace 根目录 `./...` 不匹配的坑。
#   - `build-plugin` job 提前把 plugins/ssh 编译为 artifact，e2e job 通过
#     环境变量 `MOW_SSH_PLUGIN` 复用它，避免每个平台再重复编译。
#
# 版本原则：所有 action 固定到已 GA 的 major 版本；避免误用未来 breaking。

name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      only:
        description: "Job subset to run"
        required: false
        default: "all"
        type: choice
        options: ["all", "lint", "test", "race", "gosec"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Keep in sync with every go.mod, go.work and the documented baseline.
  GO_VERSION: '1.25.x'

jobs:
  # ---------------------------------------------------------------------------
  # lint （只在 Linux 上跑一次）
  # ---------------------------------------------------------------------------
  lint:
    name: lint
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.only == 'all' || inputs.only == 'lint' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61.0
          args: --config=.golangci.yml
          # workspace 模式下 action 只能扫一个 working-dir；
          # 我们用脚本手动跑所有 module。
          skip-cache: true
          only-new-issues: false
          working-directory: core

      - name: lint remaining modules
        run: bash scripts/lint.sh
        # 若 golangci-lint 已在 PATH（前一步安装的会在），脚本会真跑；
        # 否则 SKIP。避免 double-install。

  # ---------------------------------------------------------------------------
  # 先编译一次 ssh 插件，作为 e2e artifact，节省两平台各一次的 build 成本。
  # ---------------------------------------------------------------------------
  build-plugin:
    name: build-plugin (${{ matrix.os }})
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.only == 'all' || inputs.only == 'test' || inputs.only == 'race' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build plugins/ssh
        shell: bash
        run: |
          set -euo pipefail
          cd plugins/ssh
          if [ "${{ runner.os }}" = "Windows" ]; then
            go build -o ../../ssh-plugin.exe .
          else
            go build -o ../../ssh-plugin .
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ssh-plugin-${{ runner.os }}
          path: |
            ssh-plugin
            ssh-plugin.exe
          if-no-files-found: ignore
          retention-days: 1

  # ---------------------------------------------------------------------------
  # frontend：Go build 不会编译 Wails 的 React 资源，因此单独验证。
  # ---------------------------------------------------------------------------
  frontend:
    name: frontend build
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.only == 'all' || inputs.only == 'test' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: apps/desktop/frontend/package-lock.json

      - name: Build desktop frontend
        working-directory: apps/desktop/frontend
        run: |
          npm ci
          npm run build

  # ---------------------------------------------------------------------------
  # test：build + unit + e2e
  # ---------------------------------------------------------------------------
  test:
    name: test (${{ matrix.os }})
    needs: build-plugin
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.only == 'all' || inputs.only == 'test' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Show env
        run: |
          go version
          go env GOOS GOARCH CGO_ENABLED

      - name: Build all modules
        shell: bash
        run: |
          set -euo pipefail
          for m in core apps/cli apps/desktop plugins/ssh sdk tests/e2e; do
            echo "--- build $m ---"
            (cd "$m" && go build ./...)
          done

      - name: Vet
        shell: bash
        run: |
          set -euo pipefail
          for m in core apps/cli apps/desktop plugins/ssh sdk tests/e2e; do
            (cd "$m" && go vet ./...)
          done

      - name: Unit tests
        shell: bash
        run: |
          set -euo pipefail
          (cd core && go test -count=1 ./...)
          (cd apps/cli && go test -count=1 ./...)
          (cd apps/desktop && go test -count=1 ./...)
          (cd plugins/ssh && go test -count=1 ./...)
          (cd sdk && go test -count=1 ./...)

      - name: Download prebuilt SSH plugin
        uses: actions/download-artifact@v4
        with:
          name: ssh-plugin-${{ runner.os }}
          path: ${{ github.workspace }}

      - name: E2E tests (using prebuilt plugin)
        shell: bash
        env:
          # tests/e2e 会优先读取 MOW_SSH_PLUGIN，避免每次重编。
          MOW_SSH_PLUGIN: ${{ github.workspace }}/ssh-plugin${{ runner.os == 'Windows' && '.exe' || '' }}
        run: |
          set -euo pipefail
          chmod +x "$MOW_SSH_PLUGIN" || true
          (cd tests/e2e && go test -count=1 ./...)

  # ---------------------------------------------------------------------------
  # race：CGO 必要
  # ---------------------------------------------------------------------------
  race:
    name: race (${{ matrix.os }})
    needs: build-plugin
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.only == 'all' || inputs.only == 'race' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Ensure C compiler (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Get-Command gcc -ErrorAction SilentlyContinue)) {
            choco install -y mingw --no-progress
          }
          gcc --version

      - name: Race (Linux/macOS)
        if: runner.os != 'Windows'
        run: bash scripts/race.sh

      - name: Race (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\race.ps1

  # ---------------------------------------------------------------------------
  # gosec：安全静态扫描（Linux）
  # ---------------------------------------------------------------------------
  gosec:
    name: gosec
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.only == 'all' || inputs.only == 'gosec' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: gosec
        uses: securego/gosec@v2.21.4
        with:
          # -exclude-dir 与 -no-fail 分行传，避免 shell 转义问题。
          # G402: InsecureIgnoreHostKey 会在 v0.1 缺省触发；单独在 config 关掉。
          args: -conf .gosec.json ./...
