# MOW Release Workflow
#
# 触发：推送 v* 标签（如 v0.3.0）
# 行为：
#   1. 跨平台编译 CLI（mow）、SSH Plugin（mow-ssh-plugin）、Docker Plugin（mow-docker-plugin）、Desktop（mow-desktop）
#   2. 为每个 tar.gz 生成 SHA-256 校验文件（.sha256）
#   3. 创建 GitHub Release 并上传所有二进制与校验文件
#
# 目标平台：
#   - linux/amd64, linux/arm64
#   - windows/amd64
#   - darwin/amd64, darwin/arm64
#
# 说明：
#   - CLI / SSH Plugin / Docker Plugin 用 CGO_ENABLED=0 纯静态编译，全平台矩阵都能出产物
#   - Desktop（Wails）需要 CGO 与平台原生 WebView / GTK，无法交叉编译；
#     由独立的 build-desktop job 在 Windows / Linux / macOS runner 上原生构建，
#     任何一个平台构建失败都会阻断 release（不再吞错跳过）。
#   - Release 正文使用当前主版本的验收清单（v0.3.x → docs/v0.3-acceptance-checklist.md）

name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  # Keep in sync with go.work, every go.mod and the documented baseline.
  GO_VERSION: '1.25.x'

jobs:
  # =========================================================================
  # 构建所有二进制文件
  # =========================================================================
  build:
    name: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Linux ---
          - { target: linux,   arch: amd64, goos: linux,   goarch: amd64 }
          - { target: linux,   arch: arm64, goos: linux,   goarch: arm64 }
          # --- Windows ---
          - { target: windows, arch: amd64, goos: windows, goarch: amd64 }
          # --- macOS ---
          - { target: darwin,  arch: amd64, goos: darwin,  goarch: amd64 }
          - { target: darwin,  arch: arm64, goos: darwin,  goarch: arm64 }

    steps:
      - uses: actions/checkout@v4

      - name: Resolve and verify version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(tr -d '[:space:]' < VERSION)
          TAG_RAW="${GITHUB_REF_NAME#v}"
          # 允许 tag 为 vVERSION 或 vVERSION-<pre>（例如 v0.4.1-rc.1 / v0.4.1-beta.2）
          # ldflags 注入的版本采用 tag 完整名（含 -rc.N 后缀），便于产物中通过 `mow version` 区分
          # 但要求 tag 的主版本必须与 VERSION 一致，避免 tag/VERSION 完全漂移
          TAG_BASE="${TAG_RAW%%-*}"
          if [ "$VERSION" != "$TAG_BASE" ]; then
            echo "VERSION ($VERSION) does not match tag base ($TAG_BASE, from tag $TAG_RAW)" >&2
            exit 1
          fi
          echo "version=$TAG_RAW" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: '**/go.sum'

      - name: Build CLI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          MOW_VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          BIN="mow${{ matrix.goos == 'windows' && '.exe' || '' }}"
          tar_name="mow-${{ matrix.target }}-${{ matrix.arch }}.tar.gz"
          cd apps/cli
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -X github.com/mow/mow/sdk/version.Version=${MOW_VERSION}" -o "../../${BIN}" .
          cd ../..
          tar -czf "${tar_name}" "${BIN}"
          rm -f "${BIN}"
          echo "CLI_ARCHIVE=${tar_name}" >> $GITHUB_ENV

      - name: Build SSH Plugin
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          MOW_VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          BIN="mow-ssh-plugin${{ matrix.goos == 'windows' && '.exe' || '' }}"
          tar_name="mow-ssh-plugin-${{ matrix.target }}-${{ matrix.arch }}.tar.gz"
          cd plugins/ssh
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -X github.com/mow/mow/sdk/version.Version=${MOW_VERSION}" -o "../../${BIN}" .
          cd ../..
          PKG_DIR="${GITHUB_WORKSPACE}/package-ssh"
          env -u GOOS -u GOARCH go run ./scripts/package-plugin.go -manifest plugins/ssh/plugin.json -binary "${BIN}" -os "${GOOS}" -arch "${GOARCH}" -version "${MOW_VERSION}" -out "${PKG_DIR}"
          tar -C "${PKG_DIR}" -czf "${GITHUB_WORKSPACE}/${tar_name}" .
          rm -rf "${BIN}" "${PKG_DIR}"
          echo "SSH_PLUGIN_ARCHIVE=${tar_name}" >> $GITHUB_ENV

      - name: Build Docker Plugin
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          MOW_VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          BIN="mow-docker-plugin${{ matrix.goos == 'windows' && '.exe' || '' }}"
          tar_name="mow-docker-plugin-${{ matrix.target }}-${{ matrix.arch }}.tar.gz"
          cd plugins/docker
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -X github.com/mow/mow/sdk/version.Version=${MOW_VERSION}" -o "../../${BIN}" .
          cd ../..
          PKG_DIR="${GITHUB_WORKSPACE}/package-docker"
          env -u GOOS -u GOARCH go run ./scripts/package-plugin.go -manifest plugins/docker/plugin.json -binary "${BIN}" -os "${GOOS}" -arch "${GOARCH}" -version "${MOW_VERSION}" -out "${PKG_DIR}"
          tar -C "${PKG_DIR}" -czf "${GITHUB_WORKSPACE}/${tar_name}" .
          rm -rf "${BIN}" "${PKG_DIR}"
          echo "DOCKER_PLUGIN_ARCHIVE=${tar_name}" >> $GITHUB_ENV

      - name: Build AI Plugin
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          MOW_VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          BIN="mow-ai-plugin${{ matrix.goos == 'windows' && '.exe' || '' }}"
          tar_name="mow-ai-plugin-${{ matrix.target }}-${{ matrix.arch }}.tar.gz"
          cd plugins/ai
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -X github.com/mow/mow/sdk/version.Version=${MOW_VERSION}" -o "../../${BIN}" .
          cd ../..
          PKG_DIR="${GITHUB_WORKSPACE}/package-ai"
          env -u GOOS -u GOARCH go run ./scripts/package-plugin.go -manifest plugins/ai/plugin.json -binary "${BIN}" -os "${GOOS}" -arch "${GOARCH}" -version "${MOW_VERSION}" -out "${PKG_DIR}"
          tar -C "${PKG_DIR}" -czf "${GITHUB_WORKSPACE}/${tar_name}" .
          rm -rf "${BIN}" "${PKG_DIR}"
          echo "AI_PLUGIN_ARCHIVE=${tar_name}" >> $GITHUB_ENV

      - name: Build PVE Plugin
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          MOW_VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          BIN="mow-pve-plugin${{ matrix.goos == 'windows' && '.exe' || '' }}"
          tar_name="mow-pve-plugin-${{ matrix.target }}-${{ matrix.arch }}.tar.gz"
          cd plugins/pve
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -X github.com/mow/mow/sdk/version.Version=${MOW_VERSION}" -o "../../${BIN}" .
          cd ../..
          PKG_DIR="${GITHUB_WORKSPACE}/package-pve"
          env -u GOOS -u GOARCH go run ./scripts/package-plugin.go -manifest plugins/pve/plugin.json -binary "${BIN}" -os "${GOOS}" -arch "${GOARCH}" -version "${MOW_VERSION}" -out "${PKG_DIR}"
          tar -C "${PKG_DIR}" -czf "${GITHUB_WORKSPACE}/${tar_name}" .
          rm -rf "${BIN}" "${PKG_DIR}"
          echo "PVE_PLUGIN_ARCHIVE=${tar_name}" >> $GITHUB_ENV

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          set -euo pipefail
          # 为当前 matrix 生成的所有 tar.gz 计算 SHA-256；
          # 单独一份 .sha256 便于用户 `sha256sum -c` 或 GitHub 上直接查看。
          shopt -s nullglob
          for f in *.tar.gz; do
            sha256sum "$f" > "$f.sha256"
          done
          ls -la *.tar.gz *.sha256 || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}-${{ matrix.arch }}
          path: |
            *.tar.gz
            *.sha256
          retention-days: 1

  # =========================================================================
  # Desktop (Wails) 原生构建
  #
  # Wails 依赖各平台原生 WebView / GTK 与 CGO，无法交叉编译。本 job 在
  # windows / linux / macOS runner 上分别用 `wails build` 出产物；任一平台
  # 失败都会阻断整个 release，避免过去 `|| true` 静默丢失产物的问题。
  #
  # 平台矩阵：
  #   - windows/amd64  → windows-latest（自带 WebView2 SDK）
  #   - linux/amd64    → ubuntu-latest（apt 装 libgtk-3 / libwebkit2gtk-4.1）
  #   - darwin/arm64   → macos-latest（Apple Silicon runner，Wails 原生输出 arm64）
  #   - darwin/amd64   → macos-13（Intel runner，Wails 原生输出 amd64）
  # =========================================================================
  build-desktop:
    name: build-desktop (${{ matrix.target }}/${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, target: windows, arch: amd64, goos: windows, goarch: amd64 }
          - { os: ubuntu-latest,  target: linux,   arch: amd64, goos: linux,   goarch: amd64 }
          - { os: macos-latest,   target: darwin,  arch: arm64, goos: darwin,  goarch: arm64 }
          - { os: macos-13,       target: darwin,  arch: amd64, goos: darwin,  goarch: amd64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve and verify version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(tr -d '[:space:]' < VERSION)
          TAG_RAW="${GITHUB_REF_NAME#v}"
          TAG_BASE="${TAG_RAW%%-*}"
          if [ "$VERSION" != "$TAG_BASE" ]; then
            echo "VERSION ($VERSION) does not match tag base ($TAG_BASE, from tag $TAG_RAW)" >&2
            exit 1
          fi
          echo "version=$TAG_RAW" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: '**/go.sum'

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: apps/desktop/frontend/package-lock.json

      - name: Install Linux Wails dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        shell: bash
        run: |
          set -euo pipefail
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0
          "$(go env GOPATH)/bin/wails" version

      - name: Build Desktop (Wails, native)
        env:
          MOW_VERSION: ${{ steps.version.outputs.version }}
          CGO_ENABLED: '1'
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$(go env GOPATH)/bin:$PATH"
          cd apps/desktop
          # wails build 会依次执行 npm install / npm run build / go build。
          # 使用 -platform 显式声明目标；-ldflags 通过 Wails 透传给底层 go build。
          # Ubuntu 24.04+ 使用 libwebkit2gtk-4.1，需要 `-tags webkit2_41`（wails 官方指引）。
          # 失败必须阻断：整个 step 不再吞错。
          EXTRA_TAGS=""
          if [ "${{ matrix.target }}" = "linux" ]; then
            EXTRA_TAGS="-tags webkit2_41"
          fi
          wails build \
            -platform "${{ matrix.goos }}/${{ matrix.goarch }}" \
            -trimpath \
            ${EXTRA_TAGS} \
            -ldflags "-s -w -X github.com/mow/mow/sdk/version.Version=${MOW_VERSION}"

      - name: Package Desktop artifact
        env:
          MOW_VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          BIN_EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then BIN_EXT=".exe"; fi
          tar_name="mow-desktop-${{ matrix.target }}-${{ matrix.arch }}.tar.gz"

          # Wails 产物路径约定：apps/desktop/build/bin/
          #   - windows: mow-desktop.exe
          #   - linux:   mow-desktop
          #   - darwin:  mow-desktop 或 mow-desktop.app（-platform darwin/<arch> 输出 bundle）
          cd apps/desktop/build/bin

          if [ "${{ matrix.goos }}" = "darwin" ]; then
            # macOS Wails 默认输出 .app bundle；直接打包整个 bundle 目录。
            if [ -d "mow-desktop.app" ]; then
              tar -czf "${GITHUB_WORKSPACE}/${tar_name}" "mow-desktop.app"
            elif [ -f "mow-desktop" ]; then
              tar -czf "${GITHUB_WORKSPACE}/${tar_name}" "mow-desktop"
            else
              echo "desktop artifact not found under apps/desktop/build/bin" >&2
              ls -la
              exit 1
            fi
          else
            BIN="mow-desktop${BIN_EXT}"
            if [ ! -f "${BIN}" ]; then
              echo "desktop artifact ${BIN} not found under apps/desktop/build/bin" >&2
              ls -la
              exit 1
            fi
            tar -czf "${GITHUB_WORKSPACE}/${tar_name}" "${BIN}"
          fi
          cd "${GITHUB_WORKSPACE}"
          # macOS runner 没有 sha256sum；shasum 全平台可用（Windows Git Bash 也自带）。
          shasum -a 256 "${tar_name}" > "${tar_name}.sha256"
          ls -la "${tar_name}" "${tar_name}.sha256"

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}-${{ matrix.arch }}
          path: |
            mow-desktop-${{ matrix.target }}-${{ matrix.arch }}.tar.gz
            mow-desktop-${{ matrix.target }}-${{ matrix.arch }}.tar.gz.sha256
          retention-days: 1

  # =========================================================================
  # 汇总所有平台的 tar.gz，生成官方 catalog.json（v0.5.1 P2）。
  # 该 catalog 会与 CLI 一起上传到 Release，前端 catalog 客户端可直接消费。
  # =========================================================================
  catalog:
    name: build-catalog
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: '**/go.sum'

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate catalog.json
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          PUBLISHED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          go run ./scripts/build-catalog.go \
            -plugins ssh,docker,ai,pve \
            -artifacts artifacts \
            -base-url "${BASE_URL}" \
            -version "${TAG}" \
            -published-at "${PUBLISHED_AT}" \
            -source official \
            -out artifacts/catalog.json
          echo "---- catalog.json ----"
          cat artifacts/catalog.json

      - name: Upload catalog artifact
        uses: actions/upload-artifact@v4
        with:
          name: catalog
          path: artifacts/catalog.json
          retention-days: 1

  smoke:
    name: install-smoke (${{ matrix.target }}/${{ matrix.arch }})
    needs: [build, catalog]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: linux, arch: amd64 }
          - { os: windows-latest, target: windows, arch: amd64 }
          - { os: macos-latest, target: darwin, arch: arm64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: binaries-${{ matrix.target }}-${{ matrix.arch }}
          path: artifacts
      - name: Download catalog
        uses: actions/download-artifact@v4
        with:
          name: catalog
          path: artifacts
      - name: Verify archive checksums (Unix)
        if: runner.os != 'Windows'
        working-directory: artifacts
        run: shasum -a 256 -c *.sha256
      - name: Verify archive checksums (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-ChildItem artifacts -Filter *.tar.gz | ForEach-Object {
            $expectedFile = "$($_.FullName).sha256"
            $expected = (Get-Content -LiteralPath $expectedFile).Split(' ')[0].Trim()
            $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName).Hash.ToLowerInvariant()
            if ($actual -ne $expected.ToLowerInvariant()) { throw "checksum mismatch: $($_.Name)" }
          }
      - name: Run install smoke (Unix)
        if: runner.os != 'Windows'
        run: bash scripts/release-smoke.sh artifacts ${{ matrix.target }} ${{ matrix.arch }}
      - name: Run install smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\release-smoke.ps1 -ArtifactDir artifacts -Target ${{ matrix.target }} -Arch ${{ matrix.arch }}

  # =========================================================================
  # 创建 GitHub Release 并上传所有二进制
  # =========================================================================
  release:
    name: release
    needs: [build, build-desktop, catalog, smoke]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate aggregate SHA-256 manifest
        shell: bash
        run: |
          set -euo pipefail
          cd artifacts
          # 汇总一份总的 SHA256SUMS，兼容 `sha256sum -c SHA256SUMS`
          sha256sum *.tar.gz > SHA256SUMS
          echo "---- artifacts ----"
          ls -la
          echo "---- SHA256SUMS ----"
          cat SHA256SUMS

      - name: Resolve release notes body path
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME:-${{ github.ref_name }}}"
          # rc / beta 等预发布 tag：直接使用当前 VERSION 对应的验收清单
          # 正式 tag：从 tag 中解析主版本号，形如 v0.3.0 / v0.3.1 → 0.3
          # 用于选取 docs/v0.<major>.<minor>-acceptance-checklist.md
          VERSION=$(tr -d '[:space:]' < VERSION)
          if [[ "$TAG" == *-* ]]; then
            CANDIDATE="docs/v${VERSION}-acceptance-checklist.md"
          else
            MAJOR_MINOR=$(echo "$TAG" | sed -E 's/^v([0-9]+\.[0-9]+).*/\1/')
            CANDIDATE="docs/v${MAJOR_MINOR}-acceptance-checklist.md"
          fi
          if [ -f "$CANDIDATE" ]; then
            echo "path=$CANDIDATE" >> "$GITHUB_OUTPUT"
          else
            echo "path=docs/v0.4.1-acceptance-checklist.md" >> "$GITHUB_OUTPUT"
          fi
          echo "resolved body_path: $(cat "$GITHUB_OUTPUT" | grep '^path=' | cut -d= -f2)"

      - name: Detect prerelease
        id: prerelease
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME:-${{ github.ref_name }}}"
          if [[ "$TAG" == *-* ]]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.path }}
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256
            artifacts/SHA256SUMS
            artifacts/catalog.json
          draft: false
          prerelease: ${{ steps.prerelease.outputs.value == 'true' }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
